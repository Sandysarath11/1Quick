<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
                    <style>
                        @keyframes drawStroke { to { stroke-dashoffset: 0; } }
                        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
                        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
                        .animate-draw { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawStroke 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
                        .animate-bg { animation: fadeInScale 0.8s ease-out forwards; }
                        .animate-float { animation: float 4s ease-in-out infinite; }
                    </style>
                
                        <defs>
                            <linearGradient id="splashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"></stop>
                                <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1"></stop>
                            </linearGradient>
                            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur in="SourceAlpha" stdDeviation="5"></feGaussianBlur>
                                <feOffset dx="0" dy="4" result="offsetblur"></feOffset>
                                <feComponentTransfer><feFuncA type="linear" slope="0.3"></feFuncA></feComponentTransfer>
                                <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
                            </filter>
                        </defs>
                        <!-- Background with fade-in animation -->
                        <rect width="200" height="200" fill="url(#splashGrad)" class="animate-bg"></rect>
                        
                        <!-- Floating Glass Element -->
                        <rect x="30" y="30" width="140" height="140" rx="40" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1" class="animate-bg" style="animation-delay: 0.2s; opacity: 0;"></rect>
                        
                        <!-- Number 1 and Letter Q with Draw animation -->
                        <g filter="url(#softShadow)" class="animate-float">
                            <!-- 1 -->
                            <path class="animate-draw" d="M75 130 V70 L60 80" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" style="animation-delay: 0.5s;"></path>
                            <!-- Q -->
                            <circle class="animate-draw" cx="125" cy="95" r="30" stroke="white" stroke-width="14" fill="none" style="animation-delay: 0.8s;"></circle>
                            <path class="animate-draw" d="M135 115 L155 135" stroke="white" stroke-width="14" stroke-linecap="round" style="animation-delay: 1.2s;"></path>
                        </g>
                    </svg>